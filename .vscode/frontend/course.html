<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Coding Forge - Logged Out</title>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Poppins', sans-serif; }
    body {
      min-height: 100vh; display: flex; align-items: center; justify-content: center;
      background: linear-gradient(135deg, #0f172a 0%, #1e293b 100%);
      padding: 20px;
    }
    .card {
      background: #1e293b; border: 1px solid #334155;
      border-radius: 24px; padding: 52px 44px;
      max-width: 460px; width: 100%; text-align: center;
      box-shadow: 0 32px 80px rgba(0,0,0,0.4);
      animation: fadeUp 0.4s ease;
    }
    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(24px); }
      to   { opacity: 1; transform: translateY(0); }
    }
    .brand { font-size: 18px; font-weight: 700; color: #60a5fa; margin-bottom: 32px; letter-spacing: 0.3px; }
    .icon-wrap {
      width: 88px; height: 88px; border-radius: 50%;
      background: rgba(220,38,38,0.12); border: 2px solid rgba(220,38,38,0.3);
      display: flex; align-items: center; justify-content: center;
      font-size: 40px; margin: 0 auto 24px;
    }
    h1 { font-size: 26px; font-weight: 700; color: #f1f5f9; margin-bottom: 10px; }
    .sub { font-size: 14px; color: #94a3b8; line-height: 1.7; margin-bottom: 32px; }

    /* SESSION SUMMARY */
    .summary {
      background: #0f172a; border-radius: 12px; padding: 20px;
      margin-bottom: 32px; text-align: left;
    }
    .summary-title { font-size: 12px; font-weight: 600; color: #64748b; text-transform: uppercase; letter-spacing: 0.8px; margin-bottom: 14px; }
    .summary-row { display: flex; justify-content: space-between; align-items: center; padding: 8px 0; border-bottom: 1px solid #1e293b; }
    .summary-row:last-child { border-bottom: none; }
    .summary-row .key { font-size: 13px; color: #94a3b8; }
    .summary-row .val { font-size: 13px; font-weight: 600; color: #f1f5f9; }

    /* COUNTDOWN */
    .countdown-wrap { margin-bottom: 28px; }
    .countdown-text { font-size: 13px; color: #64748b; margin-bottom: 10px; }
